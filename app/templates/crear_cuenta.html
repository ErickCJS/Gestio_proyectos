{% extends '/maestras/cuenta.html' %}

{% block contenido_cuenta %}
<div class="cn shadow-lg bg-white">
    <div class="d-flex flex-column">

        <div class="text-end">
            <a href="/" class="text-decoration-none textos_secundarios">
                <i class="bi bi-arrow-left"></i>
                Volver al inicio
            </a>
        </div>

        <div class="text-center">
            <h2 class="fw-bold mt-1 titulo">
                Crear Cuenta
            </h2>
        </div>

    </div>

    <p class="text-secondary mb-4 text-center">
        Completa la información para crear una nueva cuenta y acceder a la plataforma.
    </p>

    <form>

        <!-- Nombre -->
        <div class="mb-3">
            <label class="form-label fw-semibold">
                Nombre completo
            </label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>

                <input type="text" class="form-control" placeholder="Ingresa tu nombre completo" required>
            </div>
        </div>

        <!-- Correo -->
        <div class="mb-3">
            <label class="form-label fw-semibold">
                Correo electrónico
            </label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>

                <input type="email" class="form-control" placeholder="correo@ejemplo.com" required>
            </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-4">
            <label class="form-label fw-semibold">
                Contraseña
            </label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>

                <input type="password" class="form-control" placeholder="Crea una contraseña" required>

                <button class="btn btn-outline-secondary" type="button">
                    <i class="bi bi-eye-slash"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn w-100 py-2 btn_primario">
            <i class="bi bi-person-plus me-1"></i>
            Crear cuenta
        </button>

    </form>

    <div class="d-flex align-items-center my-4">

        <hr class="flex-grow-1">

        <span class="mx-3 text-secondary">
            ¿Ya tienes una cuenta?
        </span>

        <hr class="flex-grow-1">

    </div>

    <div class="text-center">
        <a href="/iniciar_sesion" class="text-decoration-none fw-semibold textos_secundarios">
            Iniciar sesión
        </a>
    </div>

</div>
{% endblock %}
