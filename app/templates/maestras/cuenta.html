<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %} {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/colores.css">
    <link rel="stylesheet" href="/static/css/contenido.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
    .toast{
        min-width:380px;
        max-width:420px;
        font-size:15px;
        border-radius:12px;
    }
    </style>

</head>
<body>
    <!-- TOAST -->
    {% if mensaje %}
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999; width:420px;">
        <div id="toastMensaje" class="toast text-bg-{{ mensaje.tipo }} border-0" role="alert" aria-live="assertive"
            aria-atomic="true" data-bs-autohide="true" data-bs-delay="3500">
            <div class="d-flex">
                <div class="toast-body">
                    {% if mensaje.tipo == "success" %}
                    <i class="bi bi-check-circle-fill me-2"></i>
                    {% elif mensaje.tipo == "danger" %}
                    <i class="bi bi-x-circle-fill me-2"></i>
                    {% elif mensaje.tipo == "warning" %}
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    {% elif mensaje.tipo == "primary" %}
                    <i class="bi bi-person-check-fill me-2"></i>
                    {% endif %}
                    {{ mensaje.texto }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
                </button>
            </div>
        </div>
    </div>
    {% endif %}


    <div class="row fondo min-vw-100 min-vh-100 g-0">

        <div class="col-12 d-flex justify-content-center align-items-center ">
            {% block contenido_cuenta %}


            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% if mensaje %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const toastLive = document.getElementById("toastMensaje");
            if (toastLive) {
                const toast = new bootstrap.Toast(toastLive);
                toast.show();
            }
        });
    </script>
    {% endif %}


</body>
</html>
