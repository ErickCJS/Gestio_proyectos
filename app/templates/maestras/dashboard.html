<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGERISK — Panel Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/colores.css">
    <link rel="stylesheet" href="/static/css/dasboard.css">

</head>

<body>

    <!-- ===== OVERLAY MOBILE ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">

        <!-- ==================== SIDEBAR ==================== -->
        <aside class="sidebar" id="sidebar">

            <!-- Header -->
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <div>
                        <span class="brand-name  ">MAGERISK</span>
                    </div>
                </a>
                <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <!-- Navegación -->
            <nav class="sidebar-nav">

                <!-- ===== GENERAL ===== -->
                <div class="nav-section">
                    <div class="nav-section-title">General</div>

                    <div class="nav-item-mg">
                        <a href="/dashboard" class="nav-link-mg active">
                            <span class="nav-icon-mg"><i class="bi bi-grid-1x2-fill"></i></span>
                            <span class="nav-label-mg">Dashboard</span>
                        </a>
                    </div>

                    <div class="nav-item-mg">
                        <a href="/actividad" class="nav-link-mg">
                            <span class="nav-icon-mg"><i class="bi bi-clock-history"></i></span>
                            <span class="nav-label-mg">Actividad Reciente</span>
                            <span class="nav-badge badge-cyan">3</span>
                        </a>
                    </div>
                </div>

                <!-- ===== GESTIÓN DEL ANÁLISIS ===== -->
                <div class="nav-section">
                    <div class="nav-section-title">Gestión del Análisis</div>

                    <!-- Proyectos -->
                    <div class="nav-item-mg open">
                        <button class="nav-link-mg" type="button" data-bs-toggle="collapse"
                            data-bs-target="#subProyectos" aria-expanded="true">
                            <span class="nav-icon-mg"><i class="bi bi-folder-fill"></i></span>
                            <span class="nav-label-mg">Proyectos</span>
                            <span class="nav-badge badge-orange">4</span>
                            <i class="bi bi-chevron-right nav-chevron"></i>
                        </button>
                        <div class="nav-submenu collapse show" id="subProyectos">
                            <a href="/proyectos" class="sub-link">
                                <span>Mis Proyectos</span>
                            </a>

                        </div>
                    </div>


                </div>



            </nav>

            <!-- Footer -->
            <div class="sidebar-footer">
                <a href="/logout" class="sidebar-footer-link">
                    <span class="nav-icon-mg"><i class="bi bi-box-arrow-left"></i></span>
                    <span class="nav-label-mg">Cerrar Sesión</span>
                </a>
            </div>

        </aside>

        <!-- ==================== MAIN ==================== -->
        <div class="main-content " id="mainContent">

            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="btn-toggle-sidebar" id="btnToggleSidebar" aria-label="Alternar menú">
                        <i class="bi bi-list"></i>
                    </button>
                    <nav class="breadcrumb-mg">
                        <a href="/dashboard">Inicio</a>
                        <i class="bi bi-chevron-right" style="font-size:0.6rem;"></i>
                        <span class="current">Dashboard</span>
                    </nav>
                </div>
                <div class="topbar-right d-flex">
                    <div class="d-flex justify-content-center align-items-center nombres_c">
                        <span>Julon Saldaña Erick Carlos</span>
                    </div>
                </div>
            </header>

            <!-- Contenido (placeholder) -->
            <div class="content-area">
                <div class="content-placeholder">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <h3>Dashboard</h3>
                    <p>Selecciona un módulo del menú lateral para comenzar.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/dashboard.js"> </script>
</body>

</html>
